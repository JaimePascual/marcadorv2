<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Marcador Voley San José</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>

html,body{
margin:0;
padding:0;
height:100%;
width:100%;
background:white;
font-family:Arial, Helvetica, sans-serif;
touch-action:manipulation;
display:flex;
justify-content:center;
align-items:center;
}

.container{
display:flex;
flex-direction:column;
height:90vh;
width:90vw;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.team{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:relative;
user-select:none;
}

.top{background:#e53935;}
.bottom{background:#1e88e5;}

.name{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:5vh;
font-weight:bold;
color:white;
pointer-events:none;
}

.nameInput{
font-size:5vh;
border:none;
padding:5px;
border-radius:6px;
}

.icon{
position:absolute;
top:10px;
font-size:3vh;
cursor:pointer;
}

.edit{ right:10px; }
.color{ right:45px; }

.score{
font-size:40vh;
line-height:1;
font-weight:bold;
color:white;
}

.minus{
position:absolute;
top:10px;
left:10px;
font-size:2.5vh;
padding:8px 12px;
border:none;
border-radius:6px;
background:rgba(0,0,0,0.5);
color:white;
}

.sets{
position:absolute;
bottom:10px;
display:flex;
gap:10px;
}

.set{
width:25px;
height:25px;
border-radius:50%;
border:3px solid black;
background:transparent;
}

.set.active{
background:white;
}

.controls{
position:fixed;
bottom:20px;
right:20px;
display:flex;
gap:10px;
}

.controlButton{
font-size:18px;
padding:8px 12px;
}

.palette{
position:absolute;
top:50px;
right:10px;
display:grid;
grid-template-columns:repeat(4,30px);
gap:6px;
background:white;
padding:8px;
border-radius:8px;
}

.colorBox{
width:30px;
height:30px;
border-radius:4px;
}

</style>
</head>

<body>

<div class="container">

<div class="team top" id="teamA">

<button class="minus" id="minusA">-1</button>

<div class="icon color" onclick="togglePalette('A',event)">🎨</div>
<div class="icon edit" onclick="editName('A',event)">✏️</div>

<div class="name" id="nameA">San José</div>

<div class="score" id="scoreA">0</div>

<div class="sets" id="setsA"></div>

</div>

<div class="team bottom" id="teamB">

<button class="minus" id="minusB">-1</button>

<div class="icon color" onclick="togglePalette('B',event)">🎨</div>
<div class="icon edit" onclick="editName('B',event)">✏️</div>

<div class="name" id="nameB">Rival</div>

<div class="score" id="scoreB">0</div>

<div class="sets" id="setsB"></div>

</div>

</div>

<div class="controls">
<button class="controlButton" id="resetBtn">⟲</button>
<button class="controlButton" onclick="toggleFullscreen()">⛶</button>
</div>

<script>

let scoreA = parseInt(localStorage.getItem('scoreA')) || 0
let scoreB = parseInt(localStorage.getItem('scoreB')) || 0

let colors=[
"#e53935","#1e88e5","#43a047","#fdd835",
"#8e24aa","#fb8c00","#00acc1","#546e7a"
]

function update(){

scoreA=Math.max(0,scoreA)
scoreB=Math.max(0,scoreB)

scoreAEl.textContent=scoreA
scoreBEl.textContent=scoreB

localStorage.setItem("scoreA",scoreA)
localStorage.setItem("scoreB",scoreB)

}

let scoreAEl=document.getElementById("scoreA")
let scoreBEl=document.getElementById("scoreB")

function addPoint(team){
if(team==="A") scoreA++
if(team==="B") scoreB++
update()
}

function removePoint(team){
if(team==="A") scoreA--
if(team==="B") scoreB--
update()
}

document.getElementById("teamA").addEventListener("click",()=>addPoint("A"))
document.getElementById("teamB").addEventListener("click",()=>addPoint("B"))

document.getElementById("minusA").addEventListener("click",(e)=>{
e.stopPropagation()
removePoint("A")
})

document.getElementById("minusB").addEventListener("click",(e)=>{
e.stopPropagation()
removePoint("B")
})

document.getElementById("resetBtn").addEventListener("click",()=>{

if(confirm("¿Reiniciar marcador?")){
scoreA=0
scoreB=0
update()
}

})

function toggleFullscreen(){

if(!document.fullscreenElement){
document.documentElement.requestFullscreen()
}else{
document.exitFullscreen()
}

}

function editName(team,e){

e.stopPropagation()

let nameEl=document.getElementById("name"+team)

if(nameEl.tagName==="INPUT"){

let newName=nameEl.value

let div=document.createElement("div")
div.className="name"
div.id="name"+team
div.textContent=newName

nameEl.replaceWith(div)

localStorage.setItem("team"+team+"Name",newName)

}else{

let input=document.createElement("input")
input.className="nameInput"
input.id="name"+team
input.value=nameEl.textContent

nameEl.replaceWith(input)
input.focus()

}

}

function togglePalette(team,e){

e.stopPropagation()

let old=document.querySelector(".palette")
if(old) old.remove()

let palette=document.createElement("div")
palette.className="palette"

colors.forEach(c=>{

let box=document.createElement("div")
box.className="colorBox"
box.style.background=c

box.onclick=(ev)=>{

ev.stopPropagation()

document.getElementById("team"+team).style.background=c
localStorage.setItem("team"+team+"Color",c)

palette.remove()

}

palette.appendChild(box)

})

document.getElementById("team"+team).appendChild(palette)

}

function createSets(team){

let container=document.getElementById("sets"+team)

for(let i=0;i<5;i++){

let s=document.createElement("div")
s.className="set"

if(localStorage.getItem("set"+team+i)==="1")
s.classList.add("active")

s.onclick=(e)=>{

e.stopPropagation()

s.classList.toggle("active")

localStorage.setItem(
"set"+team+i,
s.classList.contains("active")?"1":"0"
)

}

container.appendChild(s)

}

}

function loadSettings(){

let nameA=localStorage.getItem("teamAName")
let nameB=localStorage.getItem("teamBName")

if(nameA) document.getElementById("nameA").textContent=nameA
if(nameB) document.getElementById("nameB").textContent=nameB

let colorA=localStorage.getItem("teamAColor")
let colorB=localStorage.getItem("teamBColor")

if(colorA) document.getElementById("teamA").style.background=colorA
if(colorB) document.getElementById("teamB").style.background=colorB

}

createSets("A")
createSets("B")

loadSettings()
update()

</script>

</body>
</html>
